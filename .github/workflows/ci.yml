name: CI - Lint & Test

on:
  pull_request:
    branches: [main]
    paths:
      - 'api/**'
      - 'frontend/**'
      - 'shared/**'
      - 'apiv2/**'
      - '**/*.md'
  push:
    branches: [main]
    paths:
      - 'api/**'
      - 'frontend/**'
      - 'shared/**'
      - 'apiv2/**'
      - '**/*.md'
  workflow_dispatch:

env:
  NODE_VERSION: 22
  GO_VERSION: '1.26'

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.filter.outputs.api }}
      apiv2: ${{ steps.filter.outputs.apiv2 }}
      frontend: ${{ steps.filter.outputs.frontend }}
      shared: ${{ steps.filter.outputs.shared }}
      markdown: ${{ steps.filter.outputs.markdown }}
    steps:
      - uses: actions/checkout@v7
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            api:
              - 'api/**'
            apiv2:
              - 'apiv2/**'
            frontend:
              - 'frontend/**'
            shared:
              - 'shared/**'
            markdown:
              - '**/*.md'

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Build shared package
        run: npm run build:shared
      - name: Run lint and typecheck
        run: |
          npm run lint
          npm run typecheck

  lint-apiv2:
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ needs.changes.outputs.apiv2 == 'true' }}
    steps:
      - uses: actions/checkout@v7
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: apiv2/go.sum
      - name: Run Go Lint (Vet)
        run: |
          cd apiv2
          make lint

  markdownlint:
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ needs.changes.outputs.markdown == 'true' }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - name: Run markdownlint
        run: npx markdownlint-cli "**/*.md" --ignore "**/node_modules/**"

  test-api:
    runs-on: ubuntu-latest
    needs: [changes, lint]
    if: ${{ needs.changes.outputs.api == 'true' || needs.changes.outputs.shared == 'true' }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Run tests
        run: npm run test:api

  test-apiv2:
    runs-on: ubuntu-latest
    needs: [changes, lint-apiv2]
    if: ${{ needs.changes.outputs.apiv2 == 'true' }}
    steps:
      - uses: actions/checkout@v7
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: apiv2/go.sum
      - name: Run Go Tests
        run: |
          cd apiv2
          make test

  test-frontend:
    runs-on: ubuntu-latest
    needs: [changes, lint]
    if: ${{ needs.changes.outputs.frontend == 'true' || needs.changes.outputs.shared == 'true' }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Run tests
        run: npm run test:frontend